###############################################################################
# GH-200 Tutorial: Reusable Workflow (called by 07-caller-workflow.yml)
# Covers: Q46
#
# This is a REUSABLE workflow. It is called by other workflows using:
#   uses: {owner}/{repo}/.github/workflows/07-reusable-workflow.yml@main
#
# Reference format (Q46):
#   uses: org/repo/.github/workflows/file.yml@ref
###############################################################################
name: "07 - Reusable Workflow"

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string
      version:
        description: 'Version to deploy'
        required: false
        type: string
        default: 'latest'
    secrets:
      deploy_token:
        description: 'Deployment authentication token'
        required: false
    outputs:
      deploy_result:
        description: 'Result of the deployment'
        value: ${{ jobs.deploy.outputs.result }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.deploy.outputs.status }}
    steps:
      - name: Deploy to ${{ inputs.environment }}
        id: deploy
        run: |
          echo "=== Reusable Workflow Demo (Q46) ==="
          echo "Deploying version ${{ inputs.version }} to ${{ inputs.environment }}"
          echo ""
          echo "This workflow is called with:"
          echo "  uses: owner/repo/.github/workflows/07-reusable-workflow.yml@main"
          echo ""
          echo "Key points:"
          echo "• Reusable workflows use 'workflow_call' trigger"
          echo "• Must include full path: org/repo/.github/workflows/file.yml@ref (Q46)"
          echo "• Can define inputs, secrets, and outputs"
          echo "• Caller passes inputs and secrets via 'with:' and 'secrets:'"
          echo ""
          echo "status=success" >> $GITHUB_OUTPUT
