###############################################################################
# GH-200 Tutorial: Workflow Triggers & Events
# Covers: Q7, Q9, Q14, Q19, Q20, Q24, Q31, Q43
#
# This workflow demonstrates multiple trigger types.
# Push this file to .github/workflows/ in your GitHub repo.
###############################################################################
name: "01 - Triggers & Events Demo"

# Multiple triggers (Q31)
on:
  # Push trigger — runs on code push (Q31)
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'src/**'           # Only trigger for changes in src/ (Q43 concept)
      - '.github/workflows/01-*'

  # Pull request trigger with types and filters (Q43)
  pull_request:
    types: [opened, synchronize, labeled]
    branches:
      - main

  # Manual trigger (Q19) — click "Run workflow" in GitHub Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      log_level:
        description: 'Log verbosity level'
        required: false
        default: 'info'
        type: choice
        options:
          - debug
          - info
          - warn

  # Scheduled trigger (Q24) — runs on default branch only (Q9)
  schedule:
    - cron: '0 9 * * 1'    # Every Monday at 9:00 UTC

jobs:
  show-trigger-info:
    runs-on: ubuntu-latest
    steps:
      - name: Display trigger information
        run: |
          echo "=== Workflow Trigger Info ==="
          echo "Event name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Ref name: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          echo "Run number: ${{ github.run_number }}"

      - name: Show manual inputs (if workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Manual trigger detected!"
          echo "Environment: ${{ inputs.environment }}"
          echo "Log level: ${{ inputs.log_level }}"

      - name: Show PR info (if pull_request)
        if: github.event_name == 'pull_request'
        run: |
          echo "PR trigger detected!"
          echo "PR number: ${{ github.event.pull_request.number }}"
          echo "PR title: ${{ github.event.pull_request.title }}"
          echo "PR action: ${{ github.event.action }}"

      - name: Show schedule info (if schedule)
        if: github.event_name == 'schedule'
        run: |
          echo "Scheduled run!"
          echo "Cron: ${{ github.event.schedule }}"
          echo "Always runs on default branch (Q9)"
