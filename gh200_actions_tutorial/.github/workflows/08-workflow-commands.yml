###############################################################################
# GH-200 Tutorial: Workflow Commands
# Covers: Q1, Q2, Q41, Q55, Q72
#
# Demonstrates all workflow command types: debug, warning, error,
# notice, masking, grouping, and annotations.
###############################################################################
name: "08 - Workflow Commands Demo"

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/08-*'
  workflow_dispatch:

jobs:
  workflow-commands:
    runs-on: ubuntu-latest
    steps:
      # Q1: Debug messages
      - name: Debug messages (Q1)
        run: |
          echo "::debug::This is a debug message (Q1)"
          echo "::debug::Set variable myVariable to true"
          echo ""
          echo "NOTE: Debug messages only visible when"
          echo "ACTIONS_STEP_DEBUG secret is set to true (Q41)"

      # Q72: Error messages — two valid formats
      - name: Error messages (Q72)
        run: |
          echo "::error::This is a simple error message"
          echo "::error file=app.js,line=10,col=15::Error with file annotation"
          echo ""
          echo "Both formats above are valid (Q72)"

      # Warning and notice messages
      - name: Warning and notice messages
        run: |
          echo "::warning::This is a warning message"
          echo "::warning file=config.yml,line=5::Config may need updating"
          echo "::notice::This is an informational notice"

      # Masking sensitive values
      - name: Mask a value
        run: |
          MY_SECRET="super-secret-value-12345"
          echo "::add-mask::$MY_SECRET"
          echo "After masking, the value $MY_SECRET will show as ***"

      # Log grouping
      - name: Grouped logging
        run: |
          echo "::group::System Information"
          echo "OS: $(uname -s)"
          echo "Arch: $(uname -m)"
          echo "User: $(whoami)"
          echo "::endgroup::"

          echo "::group::Environment Variables"
          echo "HOME: $HOME"
          echo "SHELL: $SHELL"
          echo "PATH: $PATH"
          echo "::endgroup::"

      # Q55: Commands that SEND information from the runner
      - name: Output parameters (Q42, Q55)
        id: outputs
        run: |
          echo "color=blue" >> $GITHUB_OUTPUT
          echo "count=42" >> $GITHUB_OUTPUT
          echo ""
          echo "Output parameters send data FROM the runner (Q55)"
          echo "Two commands that send info: debug messages + output params"

      - name: Use outputs from previous step
        run: |
          echo "Color: ${{ steps.outputs.outputs.color }}"
          echo "Count: ${{ steps.outputs.outputs.count }}"

      # Summary of all commands
      - name: Command reference
        run: |
          echo "=== Workflow Commands Reference (Q2) ==="
          echo ""
          echo "Annotations:"
          echo "  echo \"::debug::message\"                    Debug (Q1)"
          echo "  echo \"::warning::message\"                  Warning"
          echo "  echo \"::error::message\"                    Error (Q72)"
          echo "  echo \"::error file=f,line=n::msg\"          Error with location (Q72)"
          echo "  echo \"::notice::message\"                   Notice"
          echo ""
          echo "Data:"
          echo "  echo \"KEY=val\" >> \$GITHUB_ENV             Set env var (Q27)"
          echo "  echo \"key=val\" >> \$GITHUB_OUTPUT          Set output (Q42)"
          echo "  echo \"/path\" >> \$GITHUB_PATH              Add to PATH"
          echo ""
          echo "Logging:"
          echo "  echo \"::add-mask::value\"                   Mask value"
          echo "  echo \"::group::title\" / ::endgroup::       Group logs"
