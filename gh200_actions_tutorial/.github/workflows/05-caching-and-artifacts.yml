###############################################################################
# GH-200 Tutorial: Caching & Artifacts
# Covers: Q33, Q39, Q47, Q48, Q59
#
# Demonstrates dependency caching and artifact upload/download.
###############################################################################
name: "05 - Caching & Artifacts Demo"

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/05-*'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Caching (Q48, Q59)
  # ─────────────────────────────────────────────
  build-with-cache:
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}

    steps:
      - uses: actions/checkout@v4

      # Q59: Cache action requires 'path' and 'key' parameters
      - name: Cache dependencies (Q59)
        id: cache
        uses: actions/cache@v4
        with:
          # Required parameter 1: path — what to cache
          path: /tmp/my-cache
          # Required parameter 2: key — cache identifier
          key: ${{ runner.os }}-demo-cache-${{ github.run_number }}
          # Optional: fallback keys
          restore-keys: |
            ${{ runner.os }}-demo-cache-

      - name: Create cached content (if cache miss)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss — creating content..."
          mkdir -p /tmp/my-cache
          echo "Cached at $(date)" > /tmp/my-cache/data.txt
          echo "Run number: ${{ github.run_number }}" >> /tmp/my-cache/data.txt

      - name: Use cached content
        run: |
          echo "=== Cache Demo (Q48, Q59) ==="
          echo "Cache hit: ${{ steps.cache.outputs.cache-hit }}"
          cat /tmp/my-cache/data.txt
          echo ""
          echo "Key points:"
          echo "• Cache requires: path + key (Q59)"
          echo "• Use caching for files that change rarely between runs (Q48)"
          echo "• Cache persists across workflow runs (Q48)"

      # Create an artifact for the next job (Q47)
      - name: Create build artifact
        run: |
          mkdir -p build-output
          echo "Build artifact created at $(date)" > build-output/result.txt
          echo "Version: 1.0.${{ github.run_number }}" >> build-output/result.txt

      # Q47: Artifacts are one of two ways to pass data between jobs
      - name: Upload artifact (Q47)
        uses: actions/upload-artifact@v4
        with:
          name: build-result
          path: build-output/
          retention-days: 5    # Q33: Configure retention to manage storage

  # ─────────────────────────────────────────────
  # Job 2: Download artifact from previous job (Q47, Q48)
  # ─────────────────────────────────────────────
  use-artifact:
    needs: build-with-cache
    runs-on: ubuntu-latest

    steps:
      # Q39: Read permission is sufficient to download artifacts
      - name: Download artifact (Q47)
        uses: actions/download-artifact@v4
        with:
          name: build-result
          path: downloaded/

      - name: Use downloaded artifact
        run: |
          echo "=== Artifact Demo (Q47, Q48) ==="
          echo "Downloaded artifact contents:"
          cat downloaded/result.txt
          echo ""
          echo "Key points:"
          echo "• Artifacts pass files between jobs (Q47)"
          echo "• Job outputs pass values between jobs (Q47)"
          echo "• Use artifacts for files needed after workflow ends (Q48)"
          echo "• Use caching for dependencies reused across runs (Q48)"
          echo "• Read permission is enough to download artifacts (Q39)"
          echo "• Only completed workflow runs can be deleted (Q40)"
