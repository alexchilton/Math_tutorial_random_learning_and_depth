###############################################################################
# GH-200 Tutorial: Docker Build & Push to GHCR
# Covers: Q71
#
# Demonstrates building a container image and pushing to GitHub
# Container Registry (ghcr.io). Three required steps:
# 1. Authenticate  2. Build  3. Push
###############################################################################
name: "09 - Docker Build & Push Demo"

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/09-*'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  # Q71: Steps to publish to GHCR — Authenticate, Build, Push
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # Required for pushing to GHCR

    steps:
      - uses: actions/checkout@v4

      # Create a simple Dockerfile for testing
      - name: Create test Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          FROM alpine:3.19
          RUN echo "GH-200 Tutorial Container" > /app.txt
          CMD ["cat", "/app.txt"]
          EOF

      # Step 1: Authenticate to GHCR (Q71)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Build the image (Q71)
      - name: Build container image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:${{ github.run_number }} .
          docker build -t ghcr.io/${{ github.repository }}:latest .

      # Step 3: Push the image (Q71)
      - name: Push container image
        run: |
          echo "=== Docker Build & Push Demo (Q71) ==="
          echo "Three steps required:"
          echo "  1. Authenticate to registry"
          echo "  2. Build the container image"
          echo "  3. Push the image to registry"
          echo ""
          echo "Pushing images..."
          docker push ghcr.io/${{ github.repository }}:${{ github.run_number }}
          docker push ghcr.io/${{ github.repository }}:latest
          echo "Done!"
