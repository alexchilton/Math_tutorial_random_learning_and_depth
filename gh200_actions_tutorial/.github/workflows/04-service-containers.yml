###############################################################################
# GH-200 Tutorial: Service Containers
# Covers: Q5
#
# Demonstrates using Redis as a service container that is ephemeral
# and does not affect future workflow runs.
###############################################################################
name: "04 - Service Containers Demo"

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/04-*'
  workflow_dispatch:

jobs:
  # Q5: Best way to use Redis without affecting future runs = service containers
  test-with-redis:
    runs-on: ubuntu-latest

    # Service containers — ephemeral, destroyed after job completes (Q5)
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Test Redis connection
        run: |
          echo "=== Service Container Demo (Q5) ==="
          echo "Redis is running as a service container"
          echo ""

          # Install redis-cli
          sudo apt-get update -qq && sudo apt-get install -y -qq redis-tools > /dev/null

          # Test connection
          redis-cli -h localhost -p 6379 ping
          echo "Connection successful!"

          # Set and get a value
          redis-cli -h localhost SET test_key "Hello from GH-200 tutorial!"
          VALUE=$(redis-cli -h localhost GET test_key)
          echo "Stored and retrieved: $VALUE"

          # Show service info
          redis-cli -h localhost INFO server | head -5

      - name: Explain service containers
        run: |
          echo "=== Key Points ==="
          echo "• Service containers are defined under 'services:' in the job"
          echo "• They are ephemeral — destroyed after the job completes"
          echo "• They do NOT affect future workflow runs"
          echo "• Better than installing software directly on the runner"
          echo "• Use health checks to ensure the service is ready"
