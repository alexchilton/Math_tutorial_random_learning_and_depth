###############################################################################
# GH-200 Tutorial: Caller Workflow (calls 07-reusable-workflow.yml)
# Covers: Q46, Q77
#
# Demonstrates calling a reusable workflow and passing different
# inputs/secrets for different environments (Q77).
###############################################################################
name: "07 - Caller Workflow"

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/07-*'
  workflow_dispatch:

jobs:
  # Q77: Same reusable workflow with different environment secrets
  deploy-staging:
    uses: ./.github/workflows/07-reusable-workflow.yml
    with:
      environment: staging
      version: "1.0.${{ github.run_number }}"
    # In a real setup, you would pass environment-specific secrets (Q77)
    # secrets:
    #   deploy_token: ${{ secrets.STAGING_DEPLOY_TOKEN }}

  deploy-production:
    needs: deploy-staging
    uses: ./.github/workflows/07-reusable-workflow.yml
    with:
      environment: production
      version: "1.0.${{ github.run_number }}"
    # secrets:
    #   deploy_token: ${{ secrets.PROD_DEPLOY_TOKEN }}

  show-results:
    needs: [deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    steps:
      - name: Show deployment results
        run: |
          echo "Staging result: ${{ needs.deploy-staging.outputs.deploy_result }}"
          echo "Production result: ${{ needs.deploy-production.outputs.deploy_result }}"
