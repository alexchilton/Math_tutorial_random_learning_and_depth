###############################################################################
# GH-200 Tutorial: Matrix Strategy & Conditional Execution
# Covers: Q11, Q17, Q44
#
# Demonstrates matrix builds across multiple versions and
# conditional job/step execution.
###############################################################################
name: "03 - Matrix & Conditions Demo"

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/03-*'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Matrix strategy (Q44) — builds across multiple versions
  # ─────────────────────────────────────────────
  matrix-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
        os-label: [ubuntu]
      fail-fast: false    # Don't cancel other jobs if one fails

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Show Node version
        run: |
          echo "Running on Node.js ${{ matrix.node-version }}"
          node --version
          npm --version

      # Q17: Multi-line run commands using pipe |
      - name: Multi-line commands (Q17)
        run: |
          echo "Step 1: Check environment"
          node -e "console.log('Node.js is working!')"
          echo "Step 2: Show matrix info"
          echo "Matrix OS: ${{ matrix.os-label }}"
          echo "Matrix Node: ${{ matrix.node-version }}"

  # ─────────────────────────────────────────────
  # Conditional execution (Q11)
  # ─────────────────────────────────────────────
  conditional-job:
    runs-on: ubuntu-latest
    # Q11: Conditional job execution using github.ref_name
    if: github.ref_name == 'main'

    steps:
      - name: Only runs on main branch (Q11)
        run: |
          echo "This job only runs on the main branch"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "Correct syntax: github.ref_name == 'branch-name'"
          echo "Wrong: github.branch.name, github.ref.name, github.branch_name"

      - name: Conditional step — push events only
        if: github.event_name == 'push'
        run: echo "This step only runs on push events"

      - name: Conditional step — manual trigger only
        if: github.event_name == 'workflow_dispatch'
        run: echo "This step only runs on manual trigger"

      - name: Always run (even on failure)
        if: always()
        run: echo "This step runs regardless of previous step outcomes"
